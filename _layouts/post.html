---
layout: default
---

<article class="post">
  <header class="post__header">
    <h1 class="post__title">{{ page.title }}</h1>
    <p>Published on <time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: '%B %e, %Y' }}</time></p>
  </header>
  <div class="post__excerpt">
    {{ page.excerpt }}
  </div>
  {{ page.content | remove: page.excerpt }}
</article>
