---
layout: base
---

<article class="page">
  <header class="page__header">
    <div class="container container--large">
      <h1 class="page__title">{{ title }}</h1>
      <p class="page__date"><time datetime="{{ page.date | htmlDateString }}">{{ page.date | readableDate }}</time></p>
    </div>
  </header>
  <div class="page__content">
    <div class="container">
      {{ content | safe }}
    </div>
  </div>
</article>
