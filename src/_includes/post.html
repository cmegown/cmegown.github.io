---
layout: base
---

<article class="post">
  <header class="post__header">
    <div class="container container--large">
      <h1 class="post__title">{{ title }}</h1>
      <p class="post__date"><time datetime="{{ page.date | date: '%Y-%m-%d' }}">{{ page.date | date: '%B %e, %Y' }}</time></p>
    </div>
  </header>
  <div class="post__content">
    <div class="container">
      {{ content | safe }}
    </div>
  </div>
</article>
